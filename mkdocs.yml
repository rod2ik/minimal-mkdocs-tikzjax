site_name: Minimal TikZJax Site
# site_description: Documentation de TikZJax
site_url: https://rod2ik.github.io/tikzjax/
# repo_url: https://github.com/rod2ik/tikzjax
# repo_name: rod2ik/tikzjax

theme:
  name: material
  custom_dir: overrides
  language: fr
  # features:
  #   - navigation.sections
  #   - navigation.top
  #   - content.code.copy
  palette:                        # Palettes de couleurs jour/nuit
      - media: "(prefers-color-scheme: light)"
        scheme: default
        primary: blue
        accent: blue
        toggle:
            icon: material/weather-night
            name: Passer au mode nuit
      - media: "(prefers-color-scheme: dark)"
        scheme: slate
        primary: pink
        accent: pink
        toggle:
            icon: material/weather-sunny
            name: Passer au mode jour

nav:
  - Home: index.md
  - HTML Standalone: custom.html

markdown_extensions:
  # - admonition
  # - attr_list
  # - md_in_html
  # - pymdownx.details
  # - pymdownx.arithmatex:
  #     generic: true
  #     smart_dollar: false
  - pymdownx.superfences:   # for ```tikzjax ... ``` syntaxes
      custom_fences:
        - name: tikzjax
          class: language-tikzjax
          format: !!python/name:pymdownx.superfences.fence_code_format
  # - pymdownx.tabbed:
  #     alternate_style: true

extra_javascript:
  - assets/javascripts/tikzjax.config.js
